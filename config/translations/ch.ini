SttnNeighborStrideDesc = 控制每帧参考的相邻帧密度。值越小参考越密集，效果越好但越慢；值越大速度越快但帧间一致性可能下降。修改后重启生效。默认为5
SttnReferenceLength = 参考帧数量
SttnReferenceLengthDesc = 控制远距离参考帧的采样跨度。值越小参考越多，效果越好但显存占用越高；值越大显存占用越低。修改后重启生效。默认为10
SttnMaxLoadNum = 最大同时处理的帧数量
SttnMaxLoadNumDesc = 设置越大处理效果越好，但是要求显存越高，默认为50
